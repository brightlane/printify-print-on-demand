name: Daily SEO Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run generator
      run: node generator/generate.js

    - name: Commit changes
      run: |
        git config user.name "seo-bot"
        git config user.email "seo-bot@example.com"

        git add .

        if git diff --cached --quiet; then
          echo "No changes"
          exit 0
        fi

        git commit -m "daily seo build"
        git push
